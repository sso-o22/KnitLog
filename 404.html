<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>니트로그</title>
    <script>
        var segmentsToKeep = 1;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
            l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/') +
            (l.search ? '&q=' + l.search.slice(1) : '') +
            l.hash
        );
    </script>
</head>
<body>
    <div id="app">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center;
                    height:100vh; font-family:'Noto Sans KR',sans-serif; color:#6b4c3b;">
            <div style="font-size:4rem; margin-bottom:16px;">🧶</div>
            <div style="font-size:1.1rem;">니트로그 불러오는 중...</div>
        </div>
    </div>
</body>
</html>
