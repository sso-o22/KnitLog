<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>니트로그</title>
    <base href="/KnitLog/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧶</text></svg>" />
    <script>
        // GitHub Pages SPA 라우팅 처리
        // 현재 경로를 쿼리스트링으로 변환해서 index.html로 리다이렉트
        var pathSegmentsToKeep = 1; // /KnitLog/ 같은 레포 이름 세그먼트 수
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
    <div id="app">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center;
                    height:100vh; font-family:'Noto Sans KR',sans-serif; color:#6b4c3b;">
            <div style="font-size:4rem; margin-bottom:16px;">🧶</div>
            <div style="font-size:1.1rem;">니트로그 불러오는 중...</div>
        </div>
    </div>
</body>
</html>
